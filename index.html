<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>師資遴選管理系統</title>
    <!-- 引入 React, Babel 與 Tailwind CSS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 圖示庫 - 使用特定穩定版本 -->
    <script src="https://unpkg.com/lucide@0.475.0/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; padding: 0; margin: 0; font-size: 10pt; }
            .report-container { 
                border: none !important; 
                box-shadow: none !important; 
                margin: 0 !important; 
                width: 100% !important; 
                padding: 10mm !important;
            }
            textarea { border: none !important; resize: none !important; overflow: hidden !important; width: 100%; }
            table { font-size: 9pt; }
            th, td { padding: 4px !important; }
            h2 { font-size: 18pt !important; margin-bottom: 10px !important; }
            h3 { font-size: 12pt !important; margin-top: 10px !important; margin-bottom: 5px !important; }
            .page-break { page-break-before: always; }
        }

        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #6366f1;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // --- 配置區 ---
        const API_URL = "https://script.google.com/macros/s/AKfycbyejinkW2h7FjCl7A7Yqv8oJB-lS7uIJJzhKjEvP3iZXzor7BxuHRFa2WMYwRGzgJVrfw/exec";

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                const renderIcon = () => {
                    if (window.lucide && iconRef.current) {
                        try {
                            const kebabName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                            iconRef.current.innerHTML = `<i data-lucide="${kebabName}" class="${className}" style="width: ${size}px; height: ${size}px;"></i>`;
                            window.lucide.createIcons();
                        } catch (e) { console.error("Icon error:", e); }
                    }
                };
                renderIcon();
                const timer = setTimeout(renderIcon, 200);
                return () => clearTimeout(timer);
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center" style={{ width: size, height: size }}></span>;
        };

        const App = () => {
            const [view, setView] = useState('login'); 
            const [adminLoggedIn, setAdminLoggedIn] = useState(false);
            const [selectedEvaluator, setSelectedEvaluator] = useState(null);
            const [loading, setLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState(null);
            
            const [evaluators, setEvaluators] = useState([]);
            const [forms, setForms] = useState([]);
            const [scores, setScores] = useState([]);

            const fetchData = async () => {
                if (!API_URL) return;
                setLoading(true);
                setErrorMsg(null);
                try {
                    const resp = await fetch(API_URL);
                    if (!resp.ok) throw new Error(`連線失敗: ${resp.status}`);
                    const data = await resp.json();
                    setEvaluators(Array.isArray(data.evaluators) ? data.evaluators : []);
                    setForms(Array.isArray(data.forms) ? data.forms : []);
                    setScores(Array.isArray(data.scores) ? data.scores : []);
                } catch (err) {
                    setErrorMsg("無法連線至資料庫，請檢查 API 網址與 GAS 權限。");
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { fetchData(); }, []);

            const apiCall = async (sheet, action, data) => {
                setLoading(true);
                try {
                    await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ sheet, action, data })
                    });
                    await fetchData(); 
                } catch (err) {
                    alert("同步失敗，請檢查網路。");
                } finally {
                    setLoading(false);
                }
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                const pwd = e.target.password.value;
                if (pwd === '76380260') {
                    setAdminLoggedIn(true);
                    setView('admin_dashboard');
                } else { alert("密碼錯誤"); }
            };

            const logout = () => {
                setAdminLoggedIn(false);
                setSelectedEvaluator(null);
                setView('login');
            };

            const [adminSubTab, setAdminSubTab] = useState('forms');

            if (view === 'login') return <LoginView evaluators={evaluators} onAdminLogin={handleAdminLogin} onEvalLogin={(id)=>{setSelectedEvaluator(evaluators.find(e=>e.id===id)); setView('evaluator_dashboard');}} loading={loading} errorMsg={errorMsg} Icon={Icon} />;

            return (
                <div className="min-h-screen text-slate-900">
                    <nav className="bg-indigo-800 text-white p-4 shadow-lg flex justify-between items-center no-print">
                        <div className="flex items-center gap-3">
                            <Icon name="FileText" size={24} />
                            <h1 className="text-xl font-black tracking-tight">師資遴選管理系統</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <span className="text-sm font-bold bg-indigo-900 px-3 py-1 rounded-full border border-indigo-500 flex items-center gap-2">
                                {loading && <div className="loader"></div>}
                                {adminLoggedIn ? "管理員" : `委員: ${selectedEvaluator?.name}`}
                            </span>
                            <button onClick={logout} className="p-2 hover:bg-red-500 rounded-full transition-all">
                                <Icon name="LogOut" />
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto p-4 md:p-8">
                        {adminLoggedIn ? (
                            <div className="flex flex-col gap-6">
                                <div className="flex gap-2 overflow-x-auto pb-2 no-print bg-white p-2 rounded-2xl shadow-sm border border-slate-200">
                                    <TabBtn active={adminSubTab==='evaluators'} onClick={()=>setAdminSubTab('evaluators')} icon="Users" label="人員管理" Icon={Icon} />
                                    <TabBtn active={adminSubTab==='forms'} onClick={()=>setAdminSubTab('forms')} icon="Settings" label="遴選表管理" Icon={Icon} />
                                    <TabBtn active={adminSubTab==='reports'} onClick={()=>setAdminSubTab('reports')} icon="FileText" label="遴選報告" Icon={Icon} />
                                    <TabBtn active={adminSubTab==='stats'} onClick={()=>setAdminSubTab('stats')} icon="BarChart2" label="分數統計" Icon={Icon} />
                                </div>
                                {adminSubTab === 'evaluators' && <EvaluatorManager evaluators={evaluators} onApi={apiCall} Icon={Icon} />}
                                {adminSubTab === 'forms' && <FormManager forms={forms} onApi={apiCall} Icon={Icon} />}
                                {adminSubTab === 'reports' && <ReportManager forms={forms} scores={scores} onApi={apiCall} Icon={Icon} />}
                                {adminSubTab === 'stats' && <StatsView forms={forms} scores={scores} Icon={Icon} />}
                            </div>
                        ) : (
                            <EvaluatorScoringView evaluator={selectedEvaluator} forms={forms} scores={scores} onApi={apiCall} Icon={Icon} />
                        )}
                    </main>
                </div>
            );
        };

        const LoginView = ({ evaluators, onAdminLogin, onEvalLogin, loading, errorMsg, Icon }) => (
            <div className="min-h-screen flex items-center justify-center bg-indigo-900 p-4 font-black">
                <div className="bg-white rounded-[2rem] shadow-2xl p-10 w-full max-w-md">
                    <div className="text-center mb-10">
                        <div className="bg-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-white">
                            <Icon name="Users" size={32} />
                        </div>
                        <h2 className="text-3xl text-slate-800 tracking-tight">師資遴選入口</h2>
                    </div>
                    {errorMsg && <div className="bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-xs">{errorMsg}</div>}
                    <div className="space-y-8">
                        <form onSubmit={onAdminLogin} className="space-y-4">
                            <h3 className="text-xs text-slate-400 uppercase tracking-widest">管理員入口</h3>
                            <input type="password" name="password" placeholder="輸入管理密碼" className="w-full p-4 border rounded-2xl bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-500" />
                            <button className="w-full bg-indigo-600 text-white p-4 rounded-2xl hover:bg-indigo-700 transition-colors">登入管理端</button>
                        </form>
                        <div className="space-y-4">
                            <h3 className="text-xs text-slate-400 uppercase tracking-widest">評分委員入口</h3>
                            <div className="grid gap-3 max-h-48 overflow-y-auto custom-scrollbar">
                                {evaluators.map(ev => (
                                    <button key={ev.id} onClick={()=>onEvalLogin(ev.id)} className="p-4 border rounded-2xl hover:bg-indigo-50 flex justify-between items-center transition-colors">
                                        <span>{ev.name}</span> <Icon name="ChevronRight" />
                                    </button>
                                ))}
                                {evaluators.length === 0 && <p className="text-slate-300 text-center py-4 italic">目前無資料</p>}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );

        const TabBtn = ({ active, onClick, icon, label, Icon }) => (
            <button onClick={onClick} className={`flex items-center gap-2 px-6 py-3 rounded-xl font-black transition-all ${active ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500 hover:text-indigo-600 hover:bg-indigo-50'}`}>
                <Icon name={icon} size={18} /> {label}
            </button>
        );

        // 1. 人員管理
        const EvaluatorManager = ({ evaluators, onApi, Icon }) => {
            const [editing, setEditing] = useState(false);
            const [formData, setFormData] = useState({ name: '', title: '' });
            return (
                <div className="bg-white rounded-3xl shadow-sm border overflow-hidden">
                    <div className="p-6 border-b flex justify-between items-center font-black">
                        <h3>評分委員清單</h3>
                        {!editing && <button onClick={()=>setEditing(true)} className="bg-indigo-600 text-white px-4 py-2 rounded-xl hover:bg-indigo-700">+ 新增委員</button>}
                    </div>
                    {editing && (
                        <form onSubmit={(e)=>{e.preventDefault(); onApi('evaluators', 'add', {...formData, id: Date.now().toString()}); setEditing(false); setFormData({name:'', title:''});}} className="p-6 bg-slate-50 flex gap-4 animate-in slide-in-from-top duration-300">
                            <input required value={formData.name} onChange={e=>setFormData({...formData, name:e.target.value})} className="p-3 border rounded-xl flex-1 outline-none" placeholder="姓名"/>
                            <input required value={formData.title} onChange={e=>setFormData({...formData, title:e.target.value})} className="p-3 border rounded-xl flex-1 outline-none" placeholder="職稱"/>
                            <button className="bg-green-600 text-white px-6 py-2 rounded-xl hover:bg-green-700">儲存</button>
                            <button type="button" onClick={()=>setEditing(false)} className="bg-slate-300 px-6 py-2 rounded-xl hover:bg-slate-400">取消</button>
                        </form>
                    )}
                    <table className="w-full text-left font-bold">
                        <thead className="bg-slate-50 text-xs border-b"><tr><th className="p-4 px-8">姓名</th><th className="p-4">職稱</th><th className="p-4 text-right px-8">操作</th></tr></thead>
                        <tbody>
                            {evaluators.map(ev => (
                                <tr key={ev.id} className="border-b hover:bg-slate-50 transition-colors">
                                    <td className="p-4 px-8">{ev.name}</td><td>{ev.title}</td>
                                    <td className="p-4 text-right px-8"><button onClick={()=>confirm('確定刪除此人員？') && onApi('evaluators', 'delete', ev)} className="text-red-400 hover:text-red-600"><Icon name="Trash2" size={18}/></button></td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };

        // 2. 遴選表管理
        const FormManager = ({ forms, onApi, Icon }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [formData, setFormData] = useState({
                id: null, courseName: '', year: new Date().getFullYear().toString(), 
                instructors: [{name: '', type: 'internal'}],
                scoringItems: [{label: '教學能力', weight: 40}, {label: '專業知識', weight: 40}, {label: '學員互動', weight: 20}],
                status: 'active'
            });

            const handleSave = (e) => {
                e.preventDefault();
                const totalWeight = formData.scoringItems.reduce((acc, cur) => acc + parseInt(cur.weight || 0), 0);
                if (totalWeight !== 100) return alert("評分加權總計必須為 100%");
                const action = formData.id ? 'update' : 'add';
                const finalData = formData.id ? formData : { ...formData, id: Date.now().toString() };
                onApi('forms', action, finalData);
                setIsEditing(false);
                resetForm();
            };

            const resetForm = () => setFormData({ id: null, courseName: '', year: new Date().getFullYear().toString(), instructors: [{name: '', type: 'internal'}], scoringItems: [{label: '教學能力', weight: 40}, {label: '專業知識', weight: 40}, {label: '學員互動', weight: 20}], status: 'active' });

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center font-black">
                        <h3 className="text-2xl">遴選專案專區</h3>
                        {!isEditing && <button onClick={()=>setIsEditing(true)} className="bg-indigo-600 text-white px-8 py-3 rounded-2xl hover:bg-indigo-700 transition-all">+ 建立新專案</button>}
                    </div>

                    {isEditing && (
                        <form onSubmit={handleSave} className="bg-white p-8 rounded-[2rem] border-2 border-indigo-50 space-y-8 animate-in fade-in duration-300">
                            <div className="grid grid-cols-2 gap-6">
                                <div><label className="text-xs font-bold text-slate-400">課程名稱</label><input required className="w-full p-4 border rounded-2xl bg-slate-50 mt-1 font-bold outline-none focus:ring-2 focus:ring-indigo-500" value={formData.courseName} onChange={e=>setFormData({...formData, courseName: e.target.value})} /></div>
                                <div><label className="text-xs font-bold text-slate-400">年度</label><input required className="w-full p-4 border rounded-2xl bg-slate-50 mt-1 font-bold outline-none focus:ring-2 focus:ring-indigo-500" value={formData.year} onChange={e=>setFormData({...formData, year: e.target.value})} /></div>
                            </div>

                            <div className="space-y-4">
                                <div className="flex justify-between items-center border-b pb-2"><h4 className="font-bold">受評講師 (1~4位)</h4><button type="button" onClick={()=>formData.instructors.length < 4 && setFormData({...formData, instructors: [...formData.instructors, {name: '', type: 'internal'}]})} className="text-indigo-600 text-xs font-bold hover:underline">+ 新增</button></div>
                                <div className="grid md:grid-cols-2 gap-4">
                                    {formData.instructors.map((ins, i) => (
                                        <div key={i} className="flex gap-2 items-center bg-slate-50 p-3 rounded-xl">
                                            <input required placeholder="講師姓名" className="flex-1 p-3 border rounded-lg outline-none" value={ins.name} onChange={e => { const copy = [...formData.instructors]; copy[i].name = e.target.value; setFormData({...formData, instructors: copy}); }} />
                                            <select className="p-2 border rounded-lg outline-none" value={ins.type} onChange={e => { const copy = [...formData.instructors]; copy[i].type = e.target.value; setFormData({...formData, instructors: copy}); }}>
                                                <option value="internal">內部</option><option value="external">外聘</option>
                                            </select>
                                            {i > 0 && <button type="button" onClick={()=>{ const copy = formData.instructors.filter((_, idx)=>idx!==i); setFormData({...formData, instructors: copy}); }} className="text-red-400 hover:bg-red-50 p-1 rounded">×</button>}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="space-y-4">
                                <div className="flex justify-between items-center border-b pb-2"><h4 className="font-bold">評分權重 (合計100%)</h4><button type="button" onClick={()=>setFormData({...formData, scoringItems: [...formData.scoringItems, {label: '', weight: 0}]})} className="text-indigo-600 text-xs font-bold hover:underline">+ 新增項目</button></div>
                                {formData.scoringItems.map((item, i) => (
                                    <div key={i} className="flex gap-4 items-center">
                                        <input required placeholder="項目名稱" className="flex-1 p-3 border rounded-xl outline-none" value={item.label} onChange={e => { const copy = [...formData.scoringItems]; copy[i].label = e.target.value; setFormData({...formData, scoringItems: copy}); }} />
                                        <div className="flex items-center gap-2"><input type="number" className="w-20 p-3 border rounded-xl text-center outline-none" value={item.weight} onChange={e => { const copy = [...formData.scoringItems]; copy[i].weight = e.target.value; setFormData({...formData, scoringItems: copy}); }} /> <span className="font-bold">%</span></div>
                                        {i > 0 && <button type="button" onClick={()=>{ const copy = formData.scoringItems.filter((_, idx)=>idx!==i); setFormData({...formData, scoringItems: copy}); }} className="text-red-400">×</button>}
                                    </div>
                                ))}
                            </div>

                            <div className="flex justify-end gap-3 pt-4 border-t">
                                <button type="button" onClick={()=>{setIsEditing(false); resetForm();}} className="px-8 py-3 rounded-xl bg-slate-100 text-slate-500 font-bold hover:bg-slate-200">取消</button>
                                <button type="submit" className="px-10 py-3 rounded-xl bg-indigo-600 text-white font-bold shadow-lg hover:bg-indigo-700 transition-all">儲存專案</button>
                            </div>
                        </form>
                    )}

                    <div className="grid md:grid-cols-3 gap-6">
                        {forms.map(form => (
                            <div key={form.id} className="bg-white p-6 rounded-[2rem] border shadow-sm group hover:border-indigo-300 transition-all duration-300">
                                <div className="flex justify-between mb-4">
                                    <span className="bg-indigo-50 text-indigo-600 text-[10px] px-2 py-1 rounded-full font-bold">{form.year}</span>
                                    <div className="flex gap-2">
                                        <button onClick={()=>{setFormData(JSON.parse(JSON.stringify(form))); setIsEditing(true);}} className="p-2 text-slate-300 hover:text-indigo-600"><Icon name="Edit3" size={16}/></button>
                                        <button onClick={()=>{const copy = JSON.parse(JSON.stringify(form)); copy.id = null; copy.courseName += " (副本)"; setFormData(copy); setIsEditing(true);}} className="p-2 text-slate-300 hover:text-blue-600"><Icon name="Copy" size={16}/></button>
                                        <button onClick={()=>confirm('確定刪除專案？') && onApi('forms', 'delete', form)} className="p-2 text-slate-300 hover:text-red-600"><Icon name="Trash2" size={16}/></button>
                                    </div>
                                </div>
                                <h4 className="font-black text-lg h-14 overflow-hidden mb-4">{form.courseName}</h4>
                                <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">受評講師</div>
                                <div className="flex flex-wrap gap-2 mt-2">
                                    {form.instructors.map((ins, i) => (
                                        <span key={i} className={`px-2 py-1 rounded-lg text-[10px] border ${ins.type==='internal'?'bg-blue-50 text-blue-600':'bg-amber-50 text-amber-600'}`}>{ins.name}</span>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // 3. 評分系統 (優化: 分數鎖定 100)
        const EvaluatorScoringView = ({ evaluator, forms, scores, onApi, Icon }) => {
            const [selectedForm, setSelectedForm] = useState(null);
            const [localScore, setLocalScore] = useState(null);

            const start = (form) => {
                setSelectedForm(form);
                const existing = Array.isArray(scores) ? scores.find(s => s.formId === form.id && s.evaluatorId === evaluator.id) : null;
                setLocalScore(existing || {
                    id: Date.now().toString(), formId: form.id, evaluatorId: evaluator.id, evaluatorName: evaluator.name,
                    instructorScores: form.instructors.map(() => ({ itemScores: form.scoringItems.map(() => 0), comment: '' }))
                });
            };

            const handleScoreChange = (insIdx, itemIdx, val) => {
                let num = parseInt(val || 0);
                if (num > 100) num = 100;
                if (num < 0) num = 0;
                const copy = { ...localScore };
                copy.instructorScores[insIdx].itemScores[itemIdx] = num;
                setLocalScore(copy);
            };

            if (selectedForm) return (
                <div className="max-w-4xl mx-auto space-y-8 pb-32 animate-in fade-in duration-500">
                    <button onClick={()=>setSelectedForm(null)} className="text-slate-400 font-black flex items-center gap-2 hover:text-slate-800 transition-colors">← 返回列表</button>
                    <div className="flex justify-between items-end">
                        <h2 className="text-3xl font-black">{selectedForm.courseName}</h2>
                        <div className="text-red-500 font-black text-sm bg-red-50 px-4 py-2 rounded-full border border-red-100 italic">★ 評分各項滿分為 100 分</div>
                    </div>
                    {selectedForm.instructors.map((ins, insIdx) => (
                        <div key={insIdx} className="bg-white p-8 rounded-[2rem] border shadow-sm relative overflow-hidden group">
                            <div className={`absolute left-0 top-0 bottom-0 w-2 transition-all group-hover:w-4 ${ins.type==='internal'?'bg-blue-500':'bg-amber-500'}`}></div>
                            <h3 className="text-2xl font-black mb-6">{ins.name} ({ins.type==='internal'?'內部':'外聘'})</h3>
                            {selectedForm.scoringItems.map((item, itemIdx) => (
                                <div key={itemIdx} className="flex items-center gap-6 mb-4 font-bold border-b border-slate-50 pb-4">
                                    <div className="flex-1">
                                        <div className="text-slate-700">{item.label}</div>
                                        <div className="text-[10px] text-slate-400 uppercase tracking-widest">權重：{item.weight}%</div>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <input 
                                            type="number" 
                                            max="100" 
                                            min="0"
                                            className="w-24 p-3 border rounded-2xl text-center bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-500 font-black text-xl" 
                                            value={localScore.instructorScores[insIdx].itemScores[itemIdx]} 
                                            onChange={e => handleScoreChange(insIdx, itemIdx, e.target.value)} 
                                        />
                                        <span className="text-slate-300">/ 100</span>
                                    </div>
                                </div>
                            ))}
                            <div className="mt-6">
                                <label className="block text-xs font-black text-slate-400 uppercase mb-2">委員評語與建議</label>
                                <textarea className="w-full p-4 border rounded-2xl bg-slate-50 font-bold outline-none focus:ring-2 focus:ring-indigo-100 min-h-[100px]" placeholder="請輸入對該講師的評語..." value={localScore.instructorScores[insIdx].comment} onChange={e=>{const copy={...localScore}; copy.instructorScores[insIdx].comment=e.target.value; setLocalScore(copy);}} />
                            </div>
                        </div>
                    ))}
                    <div className="fixed bottom-10 left-1/2 -translate-x-1/2 w-full max-w-md px-6 z-50">
                        <button onClick={()=>{onApi('scores', scores.some(s=>s.id===localScore.id)?'update':'add', localScore); setSelectedForm(null); alert("評分儲存成功");}} className="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black shadow-2xl hover:bg-indigo-700 transition-all hover:scale-105 active:scale-95">提交評分資料</button>
                    </div>
                </div>
            );

            return (
                <div className="space-y-12 animate-in fade-in duration-500">
                    <h2 className="text-4xl font-black italic tracking-tight text-slate-800">您好，{evaluator.name} 委員</h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        {forms.map(f => (
                            <div key={f.id} className="bg-white p-8 rounded-[2rem] border shadow-sm relative flex flex-col justify-between h-56 hover:shadow-lg hover:border-indigo-100 transition-all group">
                                {scores.some(s => s.formId === f.id && s.evaluatorId === evaluator.id) && <div className="absolute top-0 right-0 bg-green-500 text-white text-[10px] px-4 py-2 rounded-bl-2xl font-black shadow-sm">已完成評分</div>}
                                <h4 className="text-2xl font-black leading-tight line-clamp-2 group-hover:text-indigo-600 transition-colors">{f.courseName}</h4>
                                <button onClick={()=>start(f)} className="w-full py-4 rounded-2xl bg-indigo-600 text-white font-black shadow-lg hover:bg-indigo-700 transition-all active:scale-95">點擊進入評分</button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // 4. 遴選報告 (優化: 詳細分數清單、A4 版面配置與儲存功能)
        const ReportManager = ({ forms, scores, onApi, Icon }) => {
            const [selected, setSelected] = useState(null);
            const [reviewText, setReviewText] = useState("");
            const currentScores = scores.filter(s => s.formId === selected?.id);

            // 初始化審查結果
            useEffect(() => {
                if (selected) {
                    setReviewText(selected.reviewResult || "");
                }
            }, [selected]);

            const calculateAvg = (insIdx) => {
                if (currentScores.length === 0) return 0;
                const total = currentScores.reduce((acc, s) => {
                    const insScore = s.instructorScores[insIdx];
                    return acc + insScore.itemScores.reduce((itemAcc, val, iIdx) => itemAcc + (val * selected.scoringItems[iIdx].weight) / 100, 0);
                }, 0);
                return (total / currentScores.length).toFixed(1);
            };

            const calculateItemAvg = (insIdx, itemIdx) => {
                if (currentScores.length === 0) return 0;
                const sum = currentScores.reduce((acc, s) => acc + s.instructorScores[insIdx].itemScores[itemIdx], 0);
                return (sum / currentScores.length).toFixed(1);
            };

            const handleSaveReview = () => {
                onApi('forms', 'update', { ...selected, reviewResult: reviewText });
                alert("審查結果已成功儲存至雲端");
            };

            if (selected) return (
                <div className="report-container bg-white p-6 md:p-10 rounded-[1rem] border shadow-sm text-slate-900 font-black animate-in zoom-in-95 duration-500">
                    <div className="flex justify-between items-center mb-8 no-print">
                        <button onClick={()=>{setSelected(null); setReviewText("");}} className="text-slate-400 font-black hover:text-slate-800 transition-colors">← 返回列表</button>
                        <div className="flex gap-4">
                            <button onClick={handleSaveReview} className="bg-green-600 text-white px-6 py-2 rounded-xl font-black shadow hover:bg-green-700 transition-all flex items-center gap-2">
                                <Icon name="Save" size={18}/> 儲存審查結果
                            </button>
                            <button onClick={()=>window.print()} className="bg-indigo-600 text-white px-6 py-2 rounded-xl font-black shadow hover:bg-indigo-700 transition-all flex items-center gap-2">
                                <Icon name="Printer" size={18}/> 列印報告
                            </button>
                        </div>
                    </div>

                    <div className="text-center mb-8">
                        <h2 className="text-3xl underline underline-offset-[12px] decoration-[3px] tracking-widest font-black">師資遴選審核報告書</h2>
                        <div className="flex justify-between mt-6 text-xs text-slate-500 font-bold px-2">
                            <span>專案年度：{selected.year} 年度</span>
                            <span>報告日期：{new Date().toLocaleDateString()}</span>
                        </div>
                    </div>

                    <table className="w-full border-2 border-slate-900 mb-6">
                        <tbody>
                            <tr>
                                <td className="bg-slate-100 p-3 border-2 border-slate-900 w-24 font-black text-center text-sm">課程名稱</td>
                                <td className="p-3 border-2 border-slate-900 font-black text-xl" colSpan="3">{selected.courseName}</td>
                            </tr>
                            <tr>
                                <td className="bg-slate-100 p-3 border-2 border-slate-900 w-24 font-black text-center text-sm">遴選對象</td>
                                <td className="p-3 border-2 border-slate-900 font-bold text-sm">{selected.instructors.map(i=>i.name).join('、')}</td>
                                <td className="bg-slate-100 p-3 border-2 border-slate-900 w-24 font-black text-center text-sm">評分人數</td>
                                <td className="p-3 border-2 border-slate-900 font-bold text-center text-sm">{currentScores.length} 位委員</td>
                            </tr>
                        </tbody>
                    </table>

                    <div className="space-y-6">
                        <h3 className="text-lg font-black border-l-4 border-indigo-600 pl-3 bg-indigo-50/50 py-1">一、評分數據彙整 (各項明細)</h3>
                        {selected.instructors.map((ins, insIdx) => (
                            <div key={insIdx} className="mb-6">
                                <h4 className="font-black text-indigo-700 mb-2 flex items-center gap-2 text-sm italic">● 受評講師：{ins.name} ({ins.type === 'internal' ? '內部' : '外聘'})</h4>
                                <table className="w-full border-collapse border-2 border-slate-900 text-center text-xs">
                                    <thead className="bg-slate-100">
                                        <tr>
                                            <th className="border-2 border-slate-900 p-2 font-black">委員名稱</th>
                                            {selected.scoringItems.map((item, i)=><th key={i} className="border-2 border-slate-900 p-2 font-black">{item.label}<br/><span className="text-[9px] opacity-60">({item.weight}%)</span></th>)}
                                            <th className="border-2 border-slate-900 p-2 font-black bg-indigo-100">加權總分</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {currentScores.map((s, idx) => (
                                            <tr key={idx}>
                                                <td className="border-2 border-slate-900 p-2 bg-slate-50 font-bold">{s.evaluatorName}</td>
                                                {s.instructorScores[insIdx].itemScores.map((val, vIdx) => (
                                                    <td key={vIdx} className="border-2 border-slate-900 p-2 font-mono">{val}</td>
                                                ))}
                                                <td className="border-2 border-slate-900 p-2 font-black text-indigo-600 bg-indigo-50/30">
                                                    {s.instructorScores[insIdx].itemScores.reduce((acc, score, kIdx) => acc + (score * selected.scoringItems[kIdx].weight) / 100, 0).toFixed(1)}
                                                </td>
                                            </tr>
                                        ))}
                                        <tr className="bg-indigo-700 text-white font-black">
                                            <td className="border-2 border-slate-900 p-2 uppercase tracking-widest text-[9px]">平均得分</td>
                                            {selected.scoringItems.map((_, iIdx) => (
                                                <td key={iIdx} className="border-2 border-slate-900 p-2 font-mono">{calculateItemAvg(insIdx, iIdx)}</td>
                                            ))}
                                            <td className="border-2 border-slate-900 p-2 text-lg italic">{calculateAvg(insIdx)}</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        ))}

                        <div className="page-break"></div>

                        <h3 className="text-lg font-black border-l-4 border-indigo-600 pl-3 bg-indigo-50/50 py-1 pt-4">二、各委員綜合評語</h3>
                        <div className="grid md:grid-cols-2 gap-4">
                            {selected.instructors.map((ins, idx) => (
                                <div key={idx} className="border-2 border-slate-900 p-4 rounded-xl bg-white shadow-[4px_4px_0px_#000]">
                                    <div className="font-black text-indigo-600 border-b border-indigo-50 pb-2 mb-3 flex items-center gap-2 text-xs">
                                        <Icon name="Users" size={14}/> {ins.name} 講師之評語彙整
                                    </div>
                                    <ul className="space-y-2 text-xs font-bold text-slate-700 italic">
                                        {currentScores.map((s, si)=> s.instructorScores[idx].comment && (
                                            <li key={si} className="border-l-2 border-slate-200 pl-2 py-1 leading-relaxed">
                                                「{s.instructorScores[idx].comment}」<br/>
                                                <span className="text-[9px] text-slate-400 not-italic font-black">— {s.evaluatorName} 委員</span>
                                            </li>
                                        ))}
                                        {!currentScores.some(s => s.instructorScores[idx].comment) && <li className="text-slate-300 italic text-[9px]">尚無相關評語</li>}
                                    </ul>
                                </div>
                            ))}
                        </div>

                        <h3 className="text-lg font-black border-l-4 border-indigo-600 pl-3 bg-indigo-50/50 py-1 pt-4">三、審查結果</h3>
                        <div className="border-2 border-slate-900 p-4 rounded-xl">
                            <textarea 
                                className="w-full min-h-[100px] p-1 font-bold bg-transparent outline-none resize-none leading-relaxed text-sm" 
                                placeholder="請在此輸入審查結果（如：經評定，由ＯＯＯ講師獲選本次課程之授課講師）..." 
                                value={reviewText} 
                                onChange={(e)=>setReviewText(e.target.value)}
                            />
                        </div>

                        <div className="pt-16 grid grid-cols-2 gap-12 text-center font-black">
                            <div className="space-y-12">
                                <div className="text-md tracking-widest underline underline-offset-4">評分人員（共簽）</div>
                                <div className="border-b-2 border-slate-900 w-full h-6"></div>
                            </div>
                            <div className="space-y-12">
                                <div className="text-md tracking-widest underline underline-offset-4">管理部</div>
                                <div className="border-b-2 border-slate-900 w-full h-6"></div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                    {forms.map(f => (
                        <button key={f.id} onClick={()=>setSelected(f)} className="w-full bg-white p-6 rounded-[2rem] border-2 border-transparent flex justify-between items-center group transition-all hover:border-indigo-500 hover:shadow-xl hover:bg-white shadow-sm">
                            <div className="text-left font-black">
                                <h4 className="text-xl text-slate-800 group-hover:text-indigo-600 transition-colors">{f.courseName}</h4>
                                <p className="text-xs text-slate-400 font-bold mt-2 uppercase tracking-widest">
                                    {f.year} 年度 ∙ 共 {f.instructors.length} 位講師 ∙ 已有 {scores.filter(s=>s.formId===f.id).length} 份評核
                                </p>
                            </div>
                            <div className="bg-slate-50 p-4 rounded-2xl group-hover:bg-indigo-600 group-hover:text-white transition-all text-slate-300">
                                <Icon name="ChevronRight" size={24} />
                            </div>
                        </button>
                    ))}
                </div>
            );
        };

        // 5. 分數統計 (重構: 分為兩個頁籤，彙整所有課程平均)
        const StatsView = ({ forms, scores, Icon }) => {
            const [statsTab, setStatsTab] = useState('internal');

            const getAggregatedStats = () => {
                const instructorMap = new Map();

                forms.forEach(f => {
                    const fScores = scores.filter(s => s.formId === f.id);
                    if (fScores.length === 0) return;

                    f.instructors.forEach((ins, insIdx) => {
                        if (!instructorMap.has(ins.name)) {
                            instructorMap.set(ins.name, {
                                name: ins.name,
                                type: ins.type,
                                itemAverages: {}, // 存儲各項目標籤的平均分
                                totalWeightedScore: 0,
                                participationCount: 0
                            });
                        }

                        const data = instructorMap.get(ins.name);
                        data.participationCount++;

                        // 彙整此課程的所有評分
                        fScores.forEach(s => {
                            const insScore = s.instructorScores[insIdx];
                            
                            // 計算各個項目的分數
                            selectedFormScoringItems(f).forEach((item, itemIdx) => {
                                const label = item.label;
                                const rawScore = insScore.itemScores[itemIdx];
                                
                                if (!data.itemAverages[label]) {
                                    data.itemAverages[label] = { sum: 0, count: 0 };
                                }
                                data.itemAverages[label].sum += rawScore;
                                data.itemAverages[label].count++;
                            });

                            // 加權後的總分
                            const weighted = insScore.itemScores.reduce((acc, score, kIdx) => {
                                return acc + (score * f.scoringItems[kIdx].weight) / 100;
                            }, 0);
                            data.totalWeightedScore += weighted;
                        });
                    });
                });

                // 計算平均值
                const finalResults = Array.from(instructorMap.values()).map(d => {
                    const totalEvaluations = scores.filter(s => {
                        const form = forms.find(f => f.id === s.formId);
                        return form && form.instructors.some(i => i.name === d.name);
                    }).length;

                    const itemStats = {};
                    Object.keys(d.itemAverages).forEach(label => {
                        itemStats[label] = (d.itemAverages[label].sum / d.itemAverages[label].count).toFixed(1);
                    });

                    return {
                        name: d.name,
                        type: d.type,
                        itemStats,
                        avg: (d.totalWeightedScore / totalEvaluations).toFixed(1)
                    };
                });

                return finalResults.sort((a, b) => b.avg - a.avg);
            };

            const selectedFormScoringItems = (form) => form.scoringItems || [];
            
            const allAggregatedStats = getAggregatedStats();
            const filteredStats = allAggregatedStats.filter(s => s.type === statsTab);

            // 取得當前頁面所有出現過的評分項目標籤 (不重複)
            const allItemLabels = [...new Set(filteredStats.flatMap(s => Object.keys(s.itemStats)))];

            return (
                <div className="space-y-6 font-black animate-in fade-in duration-700">
                    {/* 頁籤切換 */}
                    <div className="flex bg-white p-1 rounded-2xl shadow-sm border w-fit mx-auto">
                        <button 
                            onClick={() => setStatsTab('internal')}
                            className={`px-10 py-3 rounded-xl transition-all ${statsTab === 'internal' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-indigo-600'}`}
                        >
                            內部講師統計
                        </button>
                        <button 
                            onClick={() => setStatsTab('external')}
                            className={`px-10 py-3 rounded-xl transition-all ${statsTab === 'external' ? 'bg-amber-600 text-white' : 'text-slate-400 hover:text-amber-600'}`}
                        >
                            外聘講師統計
                        </button>
                    </div>

                    <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm overflow-hidden">
                        <div className="flex items-center gap-3 mb-8 border-b pb-4">
                            <Icon name="BarChart2" className={statsTab === 'internal' ? "text-indigo-600" : "text-amber-600"}/>
                            <h3 className="text-2xl font-black">{statsTab === 'internal' ? '內部' : '外聘'}講師表現排行榜 (跨課程彙整)</h3>
                        </div>
                        
                        <div className="overflow-x-auto custom-scrollbar">
                            <table className="w-full text-left font-bold">
                                <thead className="bg-slate-50 text-[10px] border-b text-slate-400 uppercase tracking-widest font-black">
                                    <tr>
                                        <th className="p-5">排名</th>
                                        <th className="p-5">講師姓名</th>
                                        {allItemLabels.map(label => (
                                            <th key={label} className="p-5 text-center">{label}<br/><span className="text-[9px] opacity-60">(平均)</span></th>
                                        ))}
                                        <th className="p-5 text-center bg-indigo-50/50">加權總平均</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-50">
                                    {filteredStats.map((d, i) => (
                                        <tr key={i} className="hover:bg-slate-50/80 transition-colors">
                                            <td className="p-5 text-slate-300 font-mono text-xl italic">#{i+1}</td>
                                            <td className="p-5 font-black text-xl text-slate-800">{d.name}</td>
                                            {allItemLabels.map(label => (
                                                <td key={label} className="p-5 text-center font-mono text-slate-600">
                                                    {d.itemStats[label] || "-"}
                                                </td>
                                            ))}
                                            <td className={`p-5 text-center font-black text-3xl italic ${statsTab === 'internal' ? 'text-indigo-700' : 'text-amber-700'}`}>
                                                {d.avg}
                                            </td>
                                        </tr>
                                    ))}
                                    {filteredStats.length === 0 && <tr><td colSpan={allItemLabels.length + 3} className="p-10 text-center text-slate-300 italic">尚無相關統計數據</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-10 no-print">
                        <div className="bg-white p-10 rounded-[2rem] border text-center">
                            <div className="text-slate-400 font-black text-sm uppercase mb-2">當前分類講師總平均</div>
                            <div className={`text-6xl font-black italic ${statsTab === 'internal' ? 'text-indigo-600' : 'text-amber-600'}`}>
                                {(filteredStats.reduce((acc, cur) => acc + parseFloat(cur.avg), 0) / (filteredStats.length || 1)).toFixed(1)}
                            </div>
                        </div>
                        <div className="bg-white p-10 rounded-[2rem] border text-center">
                            <div className="text-slate-400 font-black text-sm uppercase mb-2">最高表現者</div>
                            <div className="text-4xl font-black text-slate-800">
                                {filteredStats[0]?.name || "無資料"}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
