<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教育訓練講師遴選系統</title>
    <!-- 引入 React, Babel 與 Tailwind CSS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 圖示庫 - 使用特定穩定版本 -->
    <script src="https://unpkg.com/lucide@0.475.0/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; padding: 0; margin: 0; font-size: 10pt; }
            .report-container { 
                border: none !important; 
                box-shadow: none !important; 
                margin: 0 !important; 
                width: 100% !important; 
                padding: 10mm !important;
            }
            textarea { border: none !important; resize: none !important; overflow: hidden !important; width: 100%; }
            table { font-size: 9pt; }
            th, td { padding: 4px !important; }
            h2 { font-size: 18pt !important; margin-bottom: 10px !important; }
            h3 { font-size: 12pt !important; margin-top: 10px !important; margin-bottom: 5px !important; }
            .page-break { page-break-before: always; }
        }

        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #6366f1;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        
        // --- 配置區 ---
        const API_URL = "https://script.google.com/macros/s/AKfycbyejinkW2h7FjCl7A7Yqv8oJB-lS7uIJJzhKjEvP3iZXzor7BxuHRFa2WMYwRGzgJVrfw/exec";
        const LOGO_URL = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTRRuJ4_TvLMI64SmmVvQNjU0uWaZMwrcz3xw&s";

        const CATEGORIES = [
            { id: 'in_in', label: '內訓(內聘)', color: 'bg-indigo-600', light: 'bg-indigo-50', text: 'text-indigo-600' },
            { id: 'in_ex', label: '內訓(外聘)', color: 'bg-amber-500', light: 'bg-amber-50', text: 'text-amber-600' },
            { id: 'ex', label: '外訓', color: 'bg-emerald-600', light: 'bg-emerald-50', text: 'text-emerald-600' }
        ];

        // 預設評分項目與權重
        const DEFAULT_SCORING = {
            in_in: [
                {label: '專業知識及授課經驗', weight: 30},
                {label: '表達能力', weight: 20},
                {label: '教學方式', weight: 20},
                {label: '教學態度', weight: 20},
                {label: '應對技巧', weight: 10}
            ],
            in_ex: [
                {label: '專業領域', weight: 30},
                {label: '學員滿意度', weight: 50},
                {label: '講師配合度', weight: 20}
            ],
            ex: [
                {label: '交通、環境', weight: 40},
                {label: '講師領域', weight: 40},
                {label: '單位配合度', weight: 20}
            ]
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                const renderIcon = () => {
                    if (window.lucide && iconRef.current) {
                        try {
                            const kebabName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
                            iconRef.current.innerHTML = `<i data-lucide="${kebabName}" class="${className}" style="width: ${size}px; height: ${size}px;"></i>`;
                            window.lucide.createIcons();
                        } catch (e) { console.error("Icon error:", e); }
                    }
                };
                renderIcon();
                const timer = setTimeout(renderIcon, 200);
                return () => clearTimeout(timer);
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center" style={{ width: size, height: size }}></span>;
        };

        const App = () => {
            const [view, setView] = useState('login'); 
            const [adminLoggedIn, setAdminLoggedIn] = useState(false);
            const [selectedEvaluator, setSelectedEvaluator] = useState(null);
            const [loading, setLoading] = useState(false);
            const [errorMsg, setErrorMsg] = useState(null);
            
            const [globalYear, setGlobalYear] = useState(new Date().getFullYear().toString());
            
            const [evaluators, setEvaluators] = useState([]);
            const [forms, setForms] = useState([]);
            const [scores, setScores] = useState([]);

            const fetchData = async () => {
                if (!API_URL) return;
                setLoading(true);
                setErrorMsg(null);
                try {
                    const resp = await fetch(API_URL);
                    if (!resp.ok) throw new Error(`連線失敗: ${resp.status}`);
                    const data = await resp.json();
                    setEvaluators(Array.isArray(data.evaluators) ? data.evaluators : []);
                    setForms(Array.isArray(data.forms) ? data.forms : []);
                    setScores(Array.isArray(data.scores) ? data.scores : []);
                } catch (err) {
                    setErrorMsg("連線至雲端資料庫失敗，請確認 API 網址。");
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { fetchData(); }, []);

            const availableYears = useMemo(() => {
                const yearsFromData = forms.map(f => f.year).filter(Boolean);
                const uniqueYears = [...new Set([...yearsFromData, new Date().getFullYear().toString()])];
                return uniqueYears.sort((a, b) => parseInt(b) - parseInt(a));
            }, [forms]);

            const apiCall = async (sheet, action, data) => {
                setLoading(true);
                try {
                    await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ sheet, action, data })
                    });
                    await fetchData(); 
                } catch (err) {
                    alert("同步失敗，請檢查網路連線。");
                } finally {
                    setLoading(false);
                }
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                const pwd = e.target.password.value;
                if (pwd === '76380260') {
                    setAdminLoggedIn(true);
                    setView('admin_dashboard');
                } else { alert("登入密碼錯誤"); }
            };

            const logout = () => {
                setAdminLoggedIn(false);
                setSelectedEvaluator(null);
                setView('login');
            };

            if (view === 'login') return <LoginView evaluators={evaluators} onAdminLogin={handleAdminLogin} onEvalLogin={(id)=>{setSelectedEvaluator(evaluators.find(e=>e.id===id)); setView('evaluator_dashboard');}} loading={loading} errorMsg={errorMsg} Icon={Icon} LOGO_URL={LOGO_URL} />;

            return (
                <div className="min-h-screen text-slate-900 font-black">
                    <nav className="bg-indigo-800 text-white p-4 shadow-lg flex justify-between items-center no-print">
                        <div className="flex items-center gap-3 text-left">
                            <div className="bg-white rounded-lg p-1 shadow-inner flex items-center justify-center w-10 h-10 overflow-hidden">
                                <img src={LOGO_URL} alt="Logo" className="w-full h-full object-contain" />
                            </div>
                            <h1 className="text-xl font-black tracking-tight leading-tight">教育訓練<br/>講師遴選系統</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="flex items-center gap-2 bg-indigo-900 px-3 py-1 rounded-xl border border-indigo-700">
                                <span className="text-xs font-black opacity-60">年度查詢:</span>
                                <select className="bg-transparent text-sm font-black outline-none cursor-pointer" value={globalYear} onChange={(e) => setGlobalYear(e.target.value)}>
                                    {availableYears.map(y => <option key={y} value={y} className="text-slate-900 font-black">{y} 年度</option>)}
                                </select>
                            </div>
                            <span className="text-sm font-bold bg-indigo-900 px-3 py-1 rounded-full border border-indigo-500 flex items-center gap-2">
                                {loading && <div className="loader"></div>}
                                {adminLoggedIn ? "管理員" : `委員: ${selectedEvaluator?.name}`}
                            </span>
                            <button onClick={logout} className="p-2 hover:bg-red-500 rounded-full transition-all"><Icon name="LogOut" /></button>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto p-4 md:p-8">
                        {adminLoggedIn ? (
                            <div className="flex flex-col gap-6">
                                <div className="flex gap-2 overflow-x-auto pb-2 no-print bg-white p-2 rounded-2xl shadow-sm border border-slate-200">
                                    <TabBtn active={view==='admin_dashboard'} onClick={()=>setView('admin_dashboard')} icon="Plus" label="遴選表管理" Icon={Icon} />
                                    <TabBtn active={view==='reports'} onClick={()=>setView('reports')} icon="FileText" label="遴選報告" Icon={Icon} />
                                    <TabBtn active={view==='stats'} onClick={()=>setView('stats')} icon="BarChart2" label="分數統計" Icon={Icon} />
                                </div>
                                {view === 'admin_dashboard' && <FormManager forms={forms} onApi={apiCall} Icon={Icon} selectedYear={globalYear} />}
                                {view === 'reports' && <ReportManager forms={forms} scores={scores} onApi={apiCall} Icon={Icon} selectedYear={globalYear} />}
                                {view === 'stats' && <StatsView forms={forms} scores={scores} Icon={Icon} selectedYear={globalYear} />}
                            </div>
                        ) : (
                            <EvaluatorScoringView evaluator={selectedEvaluator} forms={forms} scores={scores} onApi={apiCall} Icon={Icon} selectedYear={globalYear} />
                        )}
                    </main>
                </div>
            );
        };

        const LoginView = ({ evaluators, onAdminLogin, onEvalLogin, loading, errorMsg, Icon, LOGO_URL }) => (
            <div className="min-h-screen flex items-center justify-center bg-indigo-900 p-4 font-black text-slate-900">
                <div className="bg-white rounded-[2rem] shadow-2xl p-10 w-full max-w-md animate-in fade-in duration-500">
                    <div className="text-center mb-10">
                        <div className="bg-white w-28 h-28 rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-xl overflow-hidden border border-slate-100 p-2">
                            <img src={LOGO_URL} alt="Logo" className="w-full h-full object-contain" />
                        </div>
                        <h2 className="text-3xl font-black tracking-tight text-slate-800">教育訓練講師遴選系統</h2>
                    </div>
                    <div className="space-y-8">
                        <form onSubmit={onAdminLogin} className="space-y-4">
                            <h3 className="text-xs text-slate-400 uppercase font-black">管理員入口</h3>
                            <input type="password" name="password" placeholder="輸入管理密碼" className="w-full p-4 border rounded-2xl bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-500 font-black" />
                            <button className="w-full bg-indigo-600 text-white p-4 rounded-2xl hover:bg-indigo-700 transition-colors font-black">登入管理端</button>
                        </form>
                        <div className="space-y-4">
                            <h3 className="text-xs text-slate-400 uppercase font-black tracking-widest">評分委員入口</h3>
                            <div className="grid gap-3 max-h-48 overflow-y-auto custom-scrollbar">
                                {evaluators.map(ev => (
                                    <button key={ev.id} onClick={()=>onEvalLogin(ev.id)} className="p-4 border rounded-2xl hover:bg-indigo-50 flex justify-between items-center transition-colors font-black text-left">
                                        <span>{ev.name}</span> <Icon name="ChevronRight" />
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );

        const TabBtn = ({ active, onClick, icon, label, Icon }) => (
            <button onClick={onClick} className={`flex items-center gap-2 px-6 py-3 rounded-xl font-black transition-all ${active ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-500 hover:text-indigo-600'}`}>
                <Icon name={icon} size={18} /> {label}
            </button>
        );

        const EvaluatorManager = ({ evaluators, onApi, Icon }) => {
            const [editing, setEditing] = useState(false);
            const [formData, setFormData] = useState({ name: '', title: '' });
            return (
                <div className="bg-white rounded-3xl shadow-sm border overflow-hidden">
                    <div className="p-6 border-b flex justify-between items-center font-black text-slate-800">
                        <h3>評分委員資料庫</h3>
                        {!editing && <button onClick={()=>setEditing(true)} className="bg-indigo-600 text-white px-4 py-2 rounded-xl hover:bg-indigo-700">+ 新增人員</button>}
                    </div>
                    {editing && (
                        <form onSubmit={(e)=>{e.preventDefault(); onApi('evaluators', 'add', {...formData, id: Date.now().toString()}); setEditing(false); setFormData({name:'', title:''});}} className="p-6 bg-slate-50 flex gap-4 animate-in slide-in-from-top duration-300">
                            <input required value={formData.name} onChange={e=>setFormData({...formData, name:e.target.value})} className="p-3 border rounded-xl flex-1 outline-none font-black" placeholder="姓名"/>
                            <input required value={formData.title} onChange={e=>setFormData({...formData, title:e.target.value})} className="p-3 border rounded-xl flex-1 outline-none font-black" placeholder="職稱"/>
                            <button className="bg-green-600 text-white px-6 py-2 rounded-xl font-black">儲存</button>
                            <button type="button" onClick={()=>setEditing(false)} className="bg-slate-300 px-6 py-2 rounded-xl font-black">取消</button>
                        </form>
                    )}
                    <table className="w-full text-left font-black text-slate-700">
                        <thead className="bg-slate-50 text-[10px] border-b text-slate-400 uppercase tracking-widest font-black"><tr><th className="p-4 px-8">姓名</th><th className="p-4">職稱</th><th className="p-4 text-right px-8">操作</th></tr></thead>
                        <tbody>
                            {evaluators.map(ev => (
                                <tr key={ev.id} className="border-b hover:bg-slate-50 transition-colors">
                                    <td className="p-4 px-8">{ev.name}</td><td>{ev.title}</td>
                                    <td className="p-4 text-right px-8"><button onClick={()=>confirm('確定刪除？') && onApi('evaluators', 'delete', ev)} className="text-red-400 hover:text-red-600"><Icon name="Trash2" size={18}/></button></td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        };

        const FormManager = ({ forms, onApi, Icon, selectedYear }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [formData, setFormData] = useState({
                id: null, courseName: '', year: selectedYear, 
                category: 'in_in',
                instructors: [{name: '', type: 'internal'}],
                scoringItems: DEFAULT_SCORING.in_in,
                status: 'active'
            });

            useEffect(() => { if (!formData.id) setFormData(prev => ({ ...prev, year: selectedYear })); }, [selectedYear]);

            const yearlyForms = useMemo(() => forms.filter(f => f.year === selectedYear), [forms, selectedYear]);
            
            const stats = useMemo(() => {
                const s = { in_in: 0, in_ex: 0, ex: 0 };
                yearlyForms.forEach(f => { if(s[f.category] !== undefined) s[f.category]++; });
                return s;
            }, [yearlyForms]);

            const handleSave = (e) => {
                e.preventDefault();
                const totalWeight = formData.scoringItems.reduce((acc, cur) => acc + parseInt(cur.weight || 0), 0);
                if (totalWeight !== 100) return alert(`評分加權總計必須為 100% (目前為: ${totalWeight}%)`);
                onApi('forms', formData.id ? 'update' : 'add', formData.id ? formData : { ...formData, id: Date.now().toString() });
                setIsEditing(false); resetForm();
            };

            const resetForm = () => setFormData({ 
                id: null, 
                courseName: '', 
                year: selectedYear, 
                category: 'in_in', 
                instructors: [{name: '', type: 'internal'}], 
                scoringItems: DEFAULT_SCORING.in_in, 
                status: 'active' 
            });

            // 切換類別時自動帶入預設項目 (僅限新增模式)
            const handleCategoryChange = (catId) => {
                if (!formData.id) {
                    setFormData({
                        ...formData,
                        category: catId,
                        scoringItems: DEFAULT_SCORING[catId] || []
                    });
                } else {
                    setFormData({ ...formData, category: catId });
                }
            };

            return (
                <div className="space-y-8 font-black">
                    {/* 數據看板 */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 no-print font-black">
                        {CATEGORIES.map(cat => (
                            <div key={cat.id} className={`${cat.color} p-6 rounded-3xl text-white shadow-xl flex justify-between items-center transform hover:scale-105 transition-all`}>
                                <div><div className="text-xs opacity-70 mb-1 font-black">{cat.label} 總計</div><div className="text-4xl font-black">{stats[cat.id]} <span className="text-lg">門課</span></div></div>
                                <Icon name="BookOpen" size={32} className="opacity-40" />
                            </div>
                        ))}
                    </div>

                    <div className="flex justify-between items-center font-black">
                        <h3 className="text-2xl font-black text-slate-800">{selectedYear} 年度專案管理</h3>
                        {!isEditing && <button onClick={()=>setIsEditing(true)} className="bg-indigo-600 text-white px-8 py-3 rounded-2xl hover:bg-indigo-700 shadow-lg font-black transition-all">+ 建立新專案</button>}
                    </div>

                    {isEditing && (
                        <form onSubmit={handleSave} className="bg-white p-8 rounded-[2rem] border-2 border-indigo-50 space-y-8 shadow-sm animate-in fade-in duration-300">
                            <div className="grid grid-cols-2 gap-6 font-black">
                                <div><label className="text-xs text-slate-400 font-black">課程名稱</label><input required className="w-full p-4 border rounded-2xl bg-slate-50 font-black outline-none focus:ring-2 focus:ring-indigo-500" value={formData.courseName} onChange={e=>setFormData({...formData, courseName: e.target.value})} /></div>
                                <div><label className="text-xs text-slate-400 font-black">年度</label><input required className="w-full p-4 border rounded-2xl bg-slate-50 font-black outline-none focus:ring-2 focus:ring-indigo-500" value={formData.year} onChange={e=>setFormData({...formData, year: e.target.value})} /></div>
                            </div>
                            
                            <div className="space-y-3 font-black">
                                <label className="text-xs text-slate-400 uppercase tracking-widest font-black">課程類別設定 (切換將自動更新評分項目)</label>
                                <div className="grid grid-cols-3 gap-4">
                                    {CATEGORIES.map(cat => (
                                        <button key={cat.id} type="button" onClick={()=>handleCategoryChange(cat.id)} className={`p-4 rounded-2xl border-2 font-black transition-all flex items-center justify-center gap-2 ${formData.category === cat.id ? `${cat.color} text-white border-transparent shadow-lg` : 'bg-white text-slate-400 border-slate-100 hover:border-slate-300'}`}>
                                            {formData.category === cat.id && <Icon name="Check" size={16}/>} {cat.label}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="space-y-4 font-black">
                                <div className="flex justify-between items-center border-b pb-2"><h4 className="font-bold text-slate-700">受評講師 (1~4位)</h4><button type="button" onClick={()=>formData.instructors.length < 4 && setFormData({...formData, instructors: [...formData.instructors, {name: '', type: 'internal'}]})} className="text-indigo-600 text-xs font-black hover:underline">+ 新增講師</button></div>
                                <div className="grid md:grid-cols-2 gap-4">
                                    {formData.instructors.map((ins, i) => (
                                        <div key={i} className="flex gap-2 items-center bg-slate-50 p-3 rounded-xl">
                                            <input required placeholder="講師姓名" className="flex-1 p-2 border rounded-lg font-black" value={ins.name} onChange={e => { const copy = [...formData.instructors]; copy[i].name = e.target.value; setFormData({...formData, instructors: copy}); }} />
                                            <select className="p-2 border rounded-lg font-black outline-none" value={ins.type} onChange={e => { const copy = [...formData.instructors]; copy[i].type = e.target.value; setFormData({...formData, instructors: copy}); }}><option value="internal">內部</option><option value="external">外聘</option></select>
                                            {i > 0 && <button type="button" onClick={()=>{ setFormData({...formData, instructors: formData.instructors.filter((_, idx)=>idx!==i)}); }} className="text-red-400 hover:bg-red-50 p-1 rounded font-black">×</button>}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* 評分項目設定區塊 */}
                            <div className="space-y-4 font-black">
                                <div className="flex justify-between items-center border-b pb-2"><h4 className="font-bold text-slate-700">評分項目與權重 (合計須為 100%)</h4><button type="button" onClick={()=>setFormData({...formData, scoringItems: [...formData.scoringItems, {label: '', weight: 0}]})} className="text-indigo-600 text-xs font-black hover:underline">+ 新增評分項目</button></div>
                                <div className="space-y-3">
                                    {formData.scoringItems.map((item, i) => (
                                        <div key={i} className="flex gap-4 items-center animate-in slide-in-from-left duration-200">
                                            <input required placeholder="項目名稱" className="flex-1 p-3 border rounded-xl font-black outline-none focus:border-indigo-300" value={item.label} onChange={e => { const copy = [...formData.scoringItems]; copy[i].label = e.target.value; setFormData({...formData, scoringItems: copy}); }} />
                                            <div className="flex items-center gap-2">
                                                <input type="number" className="w-24 p-3 border rounded-xl text-center font-black outline-none focus:border-indigo-300 bg-slate-50" value={item.weight} onChange={e => { const copy = [...formData.scoringItems]; copy[i].weight = parseInt(e.target.value || 0); setFormData({...formData, scoringItems: copy}); }} />
                                                <span className="font-black text-slate-400">%</span>
                                            </div>
                                            {i > 0 && <button type="button" onClick={()=>{ setFormData({...formData, scoringItems: formData.scoringItems.filter((_, idx)=>idx!==i)}); }} className="text-red-400 font-black">刪除</button>}
                                        </div>
                                    ))}
                                </div>
                                <div className="text-right text-sm font-black text-slate-400">當前權重總計: <span className={formData.scoringItems.reduce((acc, cur) => acc + parseInt(cur.weight || 0), 0) === 100 ? "text-indigo-600" : "text-red-500"}>{formData.scoringItems.reduce((acc, cur) => acc + parseInt(cur.weight || 0), 0)}%</span></div>
                            </div>

                            <div className="flex justify-end gap-3 pt-6 border-t font-black">

        const ReportManager = ({ forms, scores, onApi, Icon, selectedYear }) => {
            const [selected, setSelected] = useState(null);

            const [winner, setWinner] = useState("");
            const currentScores = scores.filter(s => s.formId === selected?.id);
            useEffect(() => { if (selected) { setReviewText(selected.reviewResult || ""); setWinner(selected.selectedInstructor || ""); } }, [selected]);
            const filteredForms = forms.filter(f => f.year === selectedYear);

            const calculateAvg = (insIdx) => {
                if (currentScores.length === 0) return 0;
                const total = currentScores.reduce((acc, s) => {
                    const insS = s.instructorScores[insIdx]; if (!insS) return acc;
                    return acc + insS.itemScores.reduce((itemAcc, val, iIdx) => itemAcc + (val * (selected.scoringItems[iIdx]?.weight || 0)) / 100, 0);

                return (total / currentScores.length).toFixed(1);

                if (currentScores.length === 0) return 0;

                return (sum / currentScores.length).toFixed(1);

                        </tbody>

                    <h3 className="text-lg font-black border-l-4 border-indigo-600 pl-3 bg-indigo-50/50 py-1 mb-4 font-black text-slate-800 font-black">一、評分數據彙整 (各項明細)</h3>
                    {(selected.instructors || []).map((ins, insIdx) => (
                        <div key={insIdx} className="mb-6 font-black">
                            <h4 className="font-black text-indigo-700 mb-2 italic text-sm font-black flex items-center gap-2 uppercase font-black">● 受評講師：{ins.name} ({ins.type === 'internal' ? '內部' : '外聘'})</h4>
                            <table className="w-full border-collapse border-2 border-slate-900 text-center text-xs font-black text-slate-800">
                                <thead className="bg-slate-100 font-black">
                                    <tr><th className="border-2 border-slate-900 p-2 font-black font-black">委員名稱</th>{(selected.scoringItems || []).map((item, i)=><th key={i} className="border-2 border-slate-900 p-2 font-black font-black">{item.label}<br/><span className="text-[9px] opacity-60">({item.weight}%)</span></th>)}<th className="border-2 border-slate-900 p-2 bg-indigo-100 font-black font-black">加權總分</th></tr>
                                </thead>
                                <tbody>
                                    {currentScores.map((s, idx) => (
                                        <tr key={idx} className="font-black">
                                            <td className="border-2 border-slate-900 p-2 bg-slate-50 font-black font-black">{s.evaluatorName}</td>
                                            {(s.instructorScores[insIdx]?.itemScores || []).map((val, vIdx) => (<td key={vIdx} className="border-2 border-slate-900 p-2 font-mono font-black font-black">{val}</td>))}
                                            <td className="border-2 border-slate-900 p-2 text-indigo-600 font-black font-black">{(s.instructorScores[insIdx]?.itemScores || []).reduce((acc, score, kIdx) => acc + (score * (selected.scoringItems[kIdx]?.weight || 0)) / 100, 0).toFixed(1)}</td>

                                    <tr className="bg-indigo-700 text-white font-black"><td className="border-2 border-slate-900 p-2 uppercase text-[9px] font-black tracking-widest font-black">平均得分</td>{(selected.scoringItems || []).map((_, iIdx) => (<td key={iIdx} className="border-2 border-slate-900 p-2 font-mono font-black font-black">{calculateItemAvg(insIdx, iIdx)}</td>))}<td className="border-2 border-slate-900 p-2 text-lg italic font-black font-black">{calculateAvg(insIdx)}</td></tr>
                                </tbody>
                            </table>
                        </div>
                    ))}
                    <div className="page-break"></div>
                    <div className="mt-8 space-y-4 font-black">

                            </select>

                        <h3 className="text-lg font-black border-l-4 border-indigo-600 pl-3 bg-indigo-50/50 py-1 pt-4 font-black text-slate-800 uppercase font-black">二、審查結論</h3>
                        <div className="border-2 border-slate-900 p-4 rounded-xl font-black text-slate-800 font-black">

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 font-black text-left">
                                    {catForms.map(f => (
                                        <button key={f.id} onClick={()=>setSelected(f)} className="w-full bg-white p-6 rounded-3xl border-2 border-transparent flex justify-between items-center group shadow-sm hover:border-indigo-500 hover:shadow-xl transition-all font-black text-left">
                                            <div>

                                                    <p className="text-xs">{f.year} 年度 ∙ 已蒐集 {scores.filter(s=>s.formId===f.id).length} 份評核</p>
                                                    {f.selectedInstructor && <span className="bg-green-100 text-green-700 text-[10px] px-2 py-0.5 rounded-full border border-green-200 font-black">★ 勝任: {f.selectedInstructor}</span>}

                    {filteredForms.length === 0 && <div className="py-20 text-center text-slate-300 font-black italic">該年度尚無遴選報告紀錄</div>}
                </div>
            );
        };

        const StatsView = ({ forms, scores, Icon, selectedYear }) => {
            const [statsTab, setStatsTab] = useState('internal');
            
            const getAggregatedStats = () => {
                const instructorMap = new Map();
                const yearlyForms = forms.filter(f => f.year === selectedYear);
                
                yearlyForms.forEach(f => {
                    const fScores = scores.filter(s => s.formId === f.id); if (fScores.length === 0) return;
                    (f.instructors || []).forEach((ins, insIdx) => {
                        const key = `${ins.name}-${f.category}`;
                        if (!instructorMap.has(key)) instructorMap.set(key, { name: ins.name, type: ins.type, cat: f.category, itemAverages: {}, totalWeightedScore: 0, totalCount: 0 });
                        const data = instructorMap.get(key);
                        fScores.forEach(s => {
                            const insS = s.instructorScores[insIdx]; if (!insS) return;
                            data.totalCount++;
                            (f.scoringItems || []).forEach((item, itemIdx) => {
                                if (!data.itemAverages[item.label]) data.itemAverages[item.label] = { sum: 0, count: 0 };
                                data.itemAverages[item.label].sum += (insS.itemScores[itemIdx] || 0);
                                data.itemAverages[item.label].count++;
                            });
                            data.totalWeightedScore += insS.itemScores.reduce((acc, score, kIdx) => acc + (score * (f.scoringItems[kIdx]?.weight || 0)) / 100, 0);
                        });
                    });
                });
                const finalResults = Array.from(instructorMap.values()).map(d => {
                    const itemStats = {}; Object.keys(d.itemAverages).forEach(label => itemStats[label] = (d.itemAverages[label].sum / d.itemAverages[label].count).toFixed(1));
                    return { name: d.name, type: d.type, cat: d.cat, itemStats, avg: d.totalCount > 0 ? (d.totalWeightedScore / d.totalCount).toFixed(1) : "0.0" };
                });
                return finalResults.sort((a, b) => parseFloat(b.avg) - parseFloat(a.avg));
            };

            const statsData = getAggregatedStats();
            const stats = useMemo(() => {
                if (statsTab === 'internal') return statsData.filter(s => s.cat === 'in_in');
                if (statsTab === 'external_internal') return statsData.filter(s => s.cat === 'in_ex');
                if (statsTab === 'external_training') return statsData.filter(s => s.cat === 'ex');
                return [];
            }, [statsData, statsTab]);

            const allLabels = [...new Set(stats.flatMap(s => Object.keys(s.itemStats)))];
            
            return (
                <div className="space-y-6 font-black animate-in fade-in duration-700">
                    <div className="flex bg-white p-1 rounded-2xl shadow-sm border w-fit mx-auto font-black overflow-hidden no-print">

                        <button onClick={()=>setStatsTab('external_internal')} className={`px-8 py-3 rounded-xl transition-all font-black ${statsTab==='external_internal'?'bg-amber-500 text-white shadow-md':'text-slate-400 hover:text-amber-600'}`}>內訓(外聘)</button>
                        <button onClick={()=>setStatsTab('external_training')} className={`px-8 py-3 rounded-xl transition-all font-black ${statsTab==='external_training'?'bg-emerald-600 text-white shadow-md':'text-slate-400 hover:text-emerald-600'}`}>外訓</button>
                    </div>
                    
                    <div className="bg-white p-8 rounded-[2.5rem] border shadow-sm font-black">
                        <div className="flex items-center gap-3 mb-8 border-b pb-4 font-black">
                            <Icon name="BarChart2" className="text-slate-800"/>
                            <h3 className="text-2xl font-black text-slate-800">{selectedYear} 年度 {CATEGORIES.find(c=>(statsTab==='internal'?'in_in':statsTab==='external_internal'?'in_ex':'ex')===c.id)?.label} 講師排行榜</h3>
                        </div>
                        <div className="overflow-x-auto custom-scrollbar font-black text-slate-800">
                            <table className="w-full text-left font-black">
                                <thead className="bg-slate-50 text-[10px] border-b text-slate-400 uppercase tracking-widest font-black">
                                    <tr><th className="p-5 font-black font-black">排名</th><th className="p-5 font-black font-black">講師姓名</th>{allLabels.map(l=>(<th key={l} className="p-5 text-center font-black font-black">{l}<br/><span className="text-[9px] opacity-60">(年度平均)</span></th>))}<th className="p-5 text-center bg-slate-50/50 font-black font-black">總加權平均</th></tr>
                                </thead>
                                <tbody className="divide-y divide-slate-50 font-black">
                                    {stats.map((d, i)=>(
                                        <tr key={i} className="hover:bg-slate-50 transition-colors font-black">
                                            <td className="p-5 text-slate-300 font-mono text-xl italic font-black font-black">#{i+1}</td>
                                            <td className="p-5 text-xl font-black text-slate-800 font-black">{d.name}</td>
                                            {allLabels.map(l=>(<td key={l} className="p-5 text-center font-mono text-slate-600 font-black font-black">{d.itemStats[l] || "-"}</td>))}
                                            <td className={`p-5 text-center text-3xl italic font-black font-black ${statsTab==='internal'?'text-indigo-700':statsTab==='external_internal'?'text-amber-600':'text-emerald-600'}`}>{d.avg}</td>
                                        </tr>
                                    ))}
                                    {stats.length === 0 && <tr><td colSpan={10} className="p-10 text-center text-slate-300 italic font-black font-black">此年度尚無該分類的統計數據</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
